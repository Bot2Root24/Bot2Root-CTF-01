{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="text-center" style="margin-top: 15vh;">
    <h1 style="font-family: 'JetBrains Mono', monospace; font-size: 5rem; font-weight: 800; color: var(--neon-green); text-shadow: 0 0 40px rgba(0,255,65,0.2);">
        {{ code }}
    </h1>
    <p style="color: var(--text-dim); font-size: 1.1rem; margin-top: 12px;">{{ message }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-4">
        <i class="fas fa-terminal"></i> Return to Base
    </a>
</div>
{% endblock %}
