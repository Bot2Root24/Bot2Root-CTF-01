[global]
   workgroup = BOT2ROOT
   server string = Bot2Root File Server
   security = user
   map to guest = Bad User
   log file = /var/log/samba/%m.log
   max log size = 50

[public]
   comment = Public Share
   path = /srv/samba/public
   browseable = yes
   read only = yes
   guest ok = yes

[confidential]
   comment = Confidential Documents
   path = /srv/samba/confidential
   browseable = yes
   read only = yes
   guest ok = no
   valid users = smbuser smbadmin

[backup]
   comment = System Backups
   path = /srv/samba/backup
   browseable = no
   read only = yes
   guest ok = no
   valid users = @smbadmin
