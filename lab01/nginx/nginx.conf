server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # "Protected" area - bypassable via headers
    location /assets/ {
        # Check for internal access
        set $deny 1;

        if ($http_x_forwarded_for = "127.0.0.1") {
            set $deny 0;
        }

        if ($http_host = "localhost") {
            set $deny 0;
        }

        if ($deny = 1) {
            return 401;
        }

        try_files $uri $uri/ =404;
    }
}
